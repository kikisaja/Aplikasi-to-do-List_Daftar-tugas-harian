<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Tugas Ceria 📝✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <header class="todo-header">
            <h1>📝 TUGAS HARIKU</h1>
            <p>Catat rencana kegiatanmu agar hari-harimu lebih produktif!</p>
        </header>

        <div class="todo-input-box">
            <input type="text" id="input-tugas" placeholder="Ketik tugas baru di sini..." autocomplete="off">
            <button id="btn-tambah" class="btn-pop">Tambah ➕</button>
        </div>

        <ul id="daftar-tugas" class="todo-list">
            <li class="todo-item">
                <span class="todo-text">Belajar HTML dasar di kelas SMK</span>
                <button class="btn-hapus">❌</button>
            </li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
